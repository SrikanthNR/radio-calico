name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: express-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: express-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Dependency CVE audit ─────────────────────────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: express-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: express-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=low

  # ── Static security analysis ─────────────────────────────────────────────────
  lint:
    name: Security lint (eslint-plugin-security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: express-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: express-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint for insecure code patterns
        run: npm run lint

  # ── Docker image CVE scan ────────────────────────────────────────────────────
  image-scan:
    name: Image scan (trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker compose build app

      - name: Scan production image (blocks on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: radiocalico-app
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          trivyignores: .trivyignore

      - name: Scan postgres:17-alpine (informational)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: postgres:17-alpine
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Scan nginx:alpine (informational)
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: nginx:alpine
          format: table
          exit-code: "0"
          ignore-unfixed: true
          severity: HIGH,CRITICAL
