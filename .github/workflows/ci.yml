name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  # ── Unit tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: express-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: express-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Dependency CVE audit ─────────────────────────────────────────────────────
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: express-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: express-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=low

  # ── Static security analysis ─────────────────────────────────────────────────
  lint:
    name: Security lint (eslint-plugin-security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: express-app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: express-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint for insecure code patterns
        run: npm run lint

  # ── Docker image CVE scan ────────────────────────────────────────────────────
  image-scan:
    name: Image scan (trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      # Use docker build directly so the image tag is always 'radiocalico-app'
      # regardless of which directory the GitHub runner clones the repo into.
      - name: Build production image
        run: docker build --target prod --tag radiocalico-app .

      - name: Scan production image (blocks on HIGH/CRITICAL)
        run: |
          trivy image --exit-code 1 --severity HIGH,CRITICAL \
            --ignore-unfixed --ignorefile .trivyignore radiocalico-app

      - name: Scan postgres:17-alpine (informational)
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL \
            --ignore-unfixed postgres:17-alpine

      - name: Scan nginx:alpine (informational)
        run: |
          trivy image --exit-code 0 --severity HIGH,CRITICAL \
            --ignore-unfixed nginx:alpine
