services:

  # ── Development ─────────────────────────────────────────────────────────────
  # Source files are mounted live; the server restarts on every file change.
  # node_modules stays inside the image so the host OS never interferes with
  # native binaries compiled inside the container.
  dev:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    volumes:
      - ./express-app:/app/express-app       # live source reload
      - nm_dev:/app/express-app/node_modules # keep in-container node_modules
      - db_dev:/data                         # persistent SQLite DB
    environment:
      NODE_ENV: development
      DB_PATH: /data/data.db

  # ── Production: PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB:       radiocalico
      POSTGRES_USER:     radiocalico
      POSTGRES_PASSWORD: radiocalico
    volumes:
      - db_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiocalico"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Production: Express app (internal, not exposed directly) ─────────────────
  app:
    build:
      context: .
      target: prod
    environment:
      NODE_ENV:     production
      DATABASE_URL: postgres://radiocalico:radiocalico@db:5432/radiocalico
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Production: nginx reverse proxy (public entrypoint) ──────────────────────
  # `docker compose up prod` starts nginx + app + db via depends_on.
  prod:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  nm_dev:
  db_dev:
  db_prod:
